<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link id="favicon" rel="icon" type="image/svg+xml" href="./logos/Hj_light.svg" />
    <title>Hrushikesh Joshi</title>

    <script>
      const favicon = document.getElementById("favicon");

      function updateFavicon() {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          // Dark mode
          favicon.href = "./logos/Hj_dark.svg";
        } else {
          // Light mode
          favicon.href = "./logos/Hj_light.svg";
        }
      }

      // Initial set
      updateFavicon();

      // Listen for changes (if user switches mode while on the site)
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", updateFavicon);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
